# tasks/main.yml — deploys both:
# - Copy the script template to the server with mode: 0700
# - Copy the service unit to /etc/systemd/system/vault-init.service
# - systemctl enable vault-init.service — so it runs on first boot automatically

- name: Ensure vault-init directory exists
  file:
    path: "{{ VAULT_INIT_DIR }}"
    state: directory
    mode: '0700'


- name: Copy vault-init script to server
  template:
    src: vault-init.sh.j2
    dest: "{{ VAULT_INIT_DIR }}/vault-init.sh"
    mode: '0700'

- name: Copy vault-init systemd service unit to server
  template:
    src: vault-init.service.j2
    dest: /etc/systemd/system/vault-init.service
    mode: '0644'
